auth0:
  enabled: true
  audience: https://mydemo.com
  issuer: https://dev-ia6wuqy53uzqku85.us.auth0.com/
  management:
    clientId: ${AUTH0_MGMT_CLIENT_ID:none}
    clientSecret: ${AUTH0_MGMT_CLIENT_SECRET:none}
    connection: Username-Password-Authentication

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/warehouse_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

